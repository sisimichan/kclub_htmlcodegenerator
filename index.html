<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 상세 에디터</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--card:#fff;--border:#e5e5e3;--border2:#ccc;
  --t:#1a1a1a;--tm:#777;--td:#bbb;
  --surface:#f9f9f7;--surface2:#efefed;
  --ink:#1a1a1a;--ink-inv:#fff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#86efac;
  --red:#dc2626;--red-bg:#fff1f2;--red-b:#fca5a5;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-b:#93c5fd;
  --yellow-bg:#fefce8;--yellow-b:#fde047;--yellow-t:#713f12;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-b:#c4b5fd;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-b:#fed7aa;
  --teal:#0d9488;--teal-bg:#f0fdfa;--teal-b:#99f6e4;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono','Fira Code','Courier New',monospace;
  --r:10px;--r-sm:7px;--r-xs:5px;
}
body{background:var(--bg);color:var(--t);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.h-title{font-size:14px;font-weight:700;letter-spacing:-.01em;flex-shrink:0}
.h-sep{color:var(--td)}
.h-sub{font-size:11px;color:var(--tm);flex-shrink:0}
.h-spacer{flex:1}
.h-url-row{display:flex;align-items:center;gap:6px;flex-shrink:0}
.h-url-lbl{font-size:11px;font-weight:600;color:var(--tm);white-space:nowrap}
.h-url-in{width:260px;font-size:11px;font-family:var(--mono);padding:5px 9px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);color:var(--t);outline:none;transition:border-color .15s}
.h-url-in:focus{border-color:var(--ink);background:var(--card)}
.undo-btn{display:none;align-items:center;gap:5px;font-size:11px;color:var(--tm);cursor:pointer;padding:5px 11px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);transition:all .15s;white-space:nowrap;flex-shrink:0}
.undo-btn:hover{border-color:var(--border2);color:var(--t)}
.undo-btn.active{display:inline-flex}
.app{max-width:880px;margin:0 auto;padding:22px 16px 80px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:14px}
.card-lbl{font-size:10px;font-weight:700;color:var(--td);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.step-hd{font-size:10px;font-weight:700;color:var(--tm);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:11px}
.step-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.step-hint{font-size:10px;color:var(--td);margin-left:2px;letter-spacing:0;text-transform:none;font-weight:400}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--t);font-family:var(--mono);font-size:11.5px;padding:10px 13px;resize:vertical;outline:none;transition:border-color .15s;line-height:1.65}
textarea:focus{border-color:var(--ink);background:var(--card)}
textarea::placeholder{color:var(--td);font-family:var(--sans)}
textarea[readonly]{cursor:default}
input[type=text],select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);color:var(--t);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
input[type=text]:focus,select:focus{border-color:var(--ink);background:var(--card)}
input::placeholder{color:var(--td)}
.btn{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border2);color:var(--t);font-family:var(--sans);font-size:13px;font-weight:500;padding:8px 16px;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-p{background:var(--ink);color:var(--ink-inv);border-color:var(--ink)}
.btn-p:hover{background:#2d2d2d}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-d{color:var(--red);border-color:var(--red-b);background:var(--red-bg)}
.btn-d:hover{background:#fee2e2}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.multi-bar{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);align-items:center;gap:10px;padding:10px 18px;background:var(--ink);border-radius:var(--r-sm);box-shadow:0 4px 24px rgba(0,0,0,.25);z-index:150;white-space:nowrap}
.multi-bar.show{display:flex}
.multi-cnt{font-size:13px;font-weight:600;color:#fff;flex:1}
/* Section cards */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s,box-shadow .2s,opacity .2s;margin-bottom:3px}
.sec-card:hover{border-color:var(--border2);box-shadow:0 1px 5px rgba(0,0,0,.06)}
.sec-card.commented{opacity:.42}
.sec-card.dragging{opacity:.18;border-style:dashed}
.sec-card.sec-sel{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-b)}
/* Full image header */
.sec-hd{display:flex;align-items:flex-start;gap:10px;padding:11px 12px 11px 8px;cursor:pointer;user-select:none}
/* Compact header for non-image types */
.sec-hd-c{display:flex;align-items:center;gap:8px;padding:8px 12px 8px 8px;cursor:pointer;user-select:none;min-height:0}
.drag-h{display:flex;flex-direction:column;gap:3.5px;padding:4px 3px 0;cursor:grab;flex-shrink:0;opacity:.2;transition:opacity .15s}
.drag-h:hover{opacity:.55}
.drag-h:active{cursor:grabbing}
.drag-hc{display:flex;flex-direction:column;gap:3px;padding:2px 3px;cursor:grab;flex-shrink:0;opacity:.2;transition:opacity .15s}
.drag-hc:hover{opacity:.55}
.drag-hc:active{cursor:grabbing}
.dd-row{display:flex;gap:3px}
.dd{width:3px;height:3px;border-radius:50%;background:var(--tm)}
.sec-thumb{width:68px;height:86px;border-radius:7px;overflow:hidden;background:var(--surface);flex-shrink:0;border:1px solid var(--border)}
.sec-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.th-icon{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:22px}
.sec-info{flex:1;min-width:0;padding-top:1px}
.sec-name{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--t);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:4px}
/* Compact info row */
.sec-info-c{flex:1;min-width:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;overflow:hidden}
.sec-name-c{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;flex-shrink:1;min-width:0}
.sec-prev-c{font-size:11px;color:var(--td);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;flex-shrink:2;min-width:0}
.sec-meta-c{display:flex;align-items:center;gap:4px;flex-shrink:0}
/* Divider inline input */
.div-dash{font-size:11px;color:var(--td);flex-shrink:0}
.div-in{flex:1;min-width:60px;max-width:300px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xs);color:var(--t);font-family:var(--sans);font-size:12px;padding:3px 8px;outline:none;transition:border-color .15s}
.div-in:focus{border-color:var(--ink);background:var(--card)}
/* Actions */
.sec-acts{display:flex;flex-direction:column;gap:5px;flex-shrink:0;padding-top:1px}
.sec-acts-c{display:flex;gap:5px;flex-shrink:0;align-items:center}
.arr{font-size:9px;color:var(--td);transition:transform .2s;flex-shrink:0;margin-top:3px}
.arr-c{font-size:9px;color:var(--td);transition:transform .2s;flex-shrink:0}
.arr.open,.arr-c.open{transform:rotate(90deg)}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap}
.b-img  {background:var(--blue-bg);  color:var(--blue);  border:1px solid var(--blue-b)}
.b-model{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-b)}
.b-text {background:var(--surface2); color:var(--tm);    border:1px solid var(--border)}
.b-det  {background:var(--orange-bg);color:var(--orange); border:1px solid var(--orange-b)}
.b-div  {background:var(--surface2); color:var(--td);    border:1px solid var(--border)}
.b-flex {background:var(--teal-bg);  color:var(--teal);  border:1px solid var(--teal-b)}
.b-on   {background:var(--green-bg); color:var(--green); border:1px solid var(--green-b)}
.b-off  {background:var(--surface2); color:var(--tm);    border:1px solid var(--border)}
.act-btn{background:none;border:1px solid var(--border2);color:var(--tm);font-family:var(--sans);font-size:11px;font-weight:600;padding:5px 11px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.act-btn:hover{background:var(--surface2)}
.act-xs{padding:3px 9px;font-size:11px}
.act-on {border-color:var(--red-b);  color:var(--red);  background:var(--red-bg)}
.act-on:hover{background:#fee2e2}
.act-off{border-color:var(--green-b);color:var(--green);background:var(--green-bg)}
.act-off:hover{background:#dcfce7}
.act-del{border-color:var(--red-b);color:var(--red)}
.act-del:hover{background:var(--red-bg)}
/* Body */
.sec-body{display:none;border-top:1px solid var(--border);padding:12px 14px 14px;background:var(--surface)}
.sec-body.open{display:block}
/* Gallery */
.gal-hint{font-size:11px;color:var(--tm);margin-bottom:8px}
.gal-bar{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding:7px 10px;background:var(--blue-bg);border:1px solid var(--blue-b);border-radius:var(--r-xs)}
.gal-cnt{font-size:12px;font-weight:600;color:var(--blue);flex:1}
.gal-grid{display:flex;flex-wrap:wrap;gap:7px;user-select:none}
.gal-it{width:70px;height:88px;border-radius:6px;overflow:hidden;background:var(--card);border:2px solid var(--border);flex-shrink:0;position:relative;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.gal-it:hover{border-color:var(--border2)}
.gal-it.gsel{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue-b)}
.gal-it.gdrag{opacity:.3;border-style:dashed}
.gal-it.gdrop{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-b)}
.gal-it img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.gal-num{position:absolute;bottom:3px;left:4px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px;pointer-events:none}
.gal-chk{position:absolute;top:3px;right:3px;width:15px;height:15px;border-radius:99px;background:var(--blue);color:#fff;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700;pointer-events:none}
.gal-it.gsel .gal-chk{display:flex}
.rmv-notice{display:none;margin-bottom:10px;padding:8px 12px;background:var(--yellow-bg);border:1px solid var(--yellow-b);border-radius:var(--r-xs);font-size:12px;color:var(--yellow-t);line-height:1.8}
/* Code view */
.code-view-bar{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.code-toggle{background:none;border:1px solid var(--border2);color:var(--tm);font-family:var(--sans);font-size:11px;font-weight:500;padding:4px 10px;border-radius:var(--r-xs);cursor:pointer;transition:all .15s}
.code-toggle:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.code-toggle.active{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.code-area{display:none;margin-top:8px}
.code-area.open{display:block}
.code-apply{background:var(--ink);color:var(--ink-inv);border:none;font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--r-xs);cursor:pointer;margin-top:6px;transition:background .15s}
.code-apply:hover{background:#2d2d2d}
.edit-area{display:flex;flex-direction:column;gap:8px}
.model-blk{border:1px solid var(--border);border-radius:var(--r-xs);padding:10px 12px;background:var(--card)}
.model-blk-lbl{font-size:10px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.mf{display:flex;flex-direction:column;gap:4px}
.mf label{font-size:11px;color:var(--tm);font-weight:500}
.mf input,.mf select{width:100%}
.model-auto{font-size:11px;color:var(--tm);padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-xs)}
/* Add zone drop indicator */
.add-zone{padding:3px 0;position:relative;}
.add-zone.drop-target::after{content:'';display:block;height:3px;border-radius:99px;background:var(--blue);box-shadow:0 0 0 3px var(--blue-b);margin:2px 0;transition:opacity .1s;}
.az-inner{display:flex;align-items:center;gap:8px;}
.az-inner{display:flex;align-items:center;gap:8px}
.az-line{flex:1;height:1px;background:var(--border)}
.az-btn{background:none;border:1px dashed var(--border2);color:var(--td);font-size:11px;font-family:var(--sans);font-weight:500;padding:3px 12px;border-radius:5px;cursor:pointer;transition:all .15s}
.az-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.add-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;margin-top:4px}
.add-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.add-tab{background:none;border:1px solid var(--border);color:var(--tm);font-size:11.5px;font-family:var(--sans);font-weight:500;padding:5px 12px;border-radius:var(--r-xs);cursor:pointer;transition:all .15s}
.add-tab.active{background:var(--ink);color:var(--ink-inv);border-color:var(--ink)}
.add-tab:hover:not(.active){background:var(--surface2)}
.add-pane{display:none}
.add-pane.active{display:block}
.f-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.f-fld{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.f-fld.short{flex:0 0 140px}
.f-fld label{font-size:11.5px;color:var(--tm);font-weight:500}
.f-fld input,.f-fld select,.f-fld textarea{width:100%}
.f-fld .hint{font-size:10px;color:var(--td);margin-top:1px}
.f-model-info{font-size:11px;color:var(--tm);padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-xs);margin-bottom:8px}
.f-btns{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--surface2);margin-top:2px}
/* Generate */
.gen-btn{width:100%;padding:11px;background:var(--ink);color:var(--ink-inv);border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;letter-spacing:.01em;font-family:var(--sans)}
.gen-btn:hover{background:#2d2d2d}
.gen-btn:disabled{background:#aaa;cursor:not-allowed}
.prog-wrap{display:none;background:var(--surface2);border-radius:99px;height:5px;overflow:hidden;margin-top:10px}
.prog-bar{height:100%;background:var(--ink);border-radius:99px;width:0%;transition:width .12s}
.prog-lbl{display:none;font-size:11px;color:var(--tm);margin-top:4px;text-align:center}
.f-result{display:none;margin-top:10px;padding:9px 14px;border-radius:var(--r-xs);font-size:12px;line-height:1.9}
.f-result.ok  {background:var(--green-bg);border:1px solid var(--green-b);color:var(--green)}
.f-result.warn{background:var(--yellow-bg);border:1px solid var(--yellow-b);color:var(--yellow-t)}
.f-result.err {background:var(--red-bg);border:1px solid var(--red-b);color:var(--red)}
.out-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.out-meta{font-size:12px;color:var(--tm)}
.copy-btn{width:100%;margin-top:9px;padding:10px;background:var(--card);color:var(--t);border:1px solid var(--border2);border-radius:var(--r-xs);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.copy-btn:hover{border-color:var(--ink);background:var(--surface2)}
.copy-btn.copied{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
/* Lightbox */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;pointer-events:none}
.lb.show{opacity:1;pointer-events:all}
.lb img{max-width:92vw;max-height:88vh;border-radius:6px;transform:scale(.94);transition:transform .18s;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lb.show img{transform:scale(1)}
.lb-x{position:fixed;top:18px;right:22px;color:#fff;font-size:26px;cursor:pointer;opacity:.7;transition:opacity .15s;background:none;border:none;padding:4px 8px;line-height:1}
.lb-x:hover{opacity:1}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);color:#fff;font-size:32px;cursor:pointer;opacity:.45;transition:opacity .15s;background:none;border:none;padding:8px 14px;line-height:1}
.lb-nav:hover{opacity:1}
.lb-p{left:12px}.lb-n{right:12px}
.lb-info{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.55);font-size:11px;font-family:var(--mono);white-space:nowrap}
/* Section card appear animation - removed bounce, kept flash only */
/* History panel */
.hist-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--tm);cursor:pointer;padding:5px 11px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);transition:all .15s;white-space:nowrap;flex-shrink:0}
.hist-btn:hover{border-color:var(--border2);color:var(--t)}
.hist-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;opacity:0;transition:opacity .22s;pointer-events:none}
.hist-overlay.show{opacity:1;pointer-events:all}
.hist-panel{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transition:right .25s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.hist-panel.open{right:0}
.hist-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.hist-title{font-size:13px;font-weight:700;color:var(--t)}
.hist-close{background:none;border:none;color:var(--tm);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1}
.hist-close:hover{background:var(--surface2);color:var(--t)}
.hist-sub{font-size:10px;color:var(--td);padding:7px 16px 0;flex-shrink:0}
.hist-list{flex:1;overflow-y:auto;padding:6px 0}
.hist-empty{font-size:12px;color:var(--td);text-align:center;padding:32px 16px}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--surface2);transition:background .12s;cursor:pointer;user-select:none}
.hist-item:hover{background:var(--blue-bg)}
.hist-item:hover .hist-lbl{color:var(--blue)}
.hist-item.hist-latest{background:var(--green-bg)}
.hist-item.hist-latest .hist-lbl{color:var(--green)}
.hist-idx{font-size:10px;font-family:var(--mono);color:var(--td);width:20px;flex-shrink:0;text-align:right}
.hist-lbl{flex:1;font-size:12px;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-time{font-size:10px;color:var(--td);flex-shrink:0}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--ink-inv);font-size:13px;font-weight:500;padding:9px 20px;border-radius:var(--r-sm);opacity:0;transition:all .22s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Mode tabs */
.mode-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;width:fit-content}
.mode-tab{background:none;border:none;color:var(--tm);font-family:var(--sans);font-size:12px;font-weight:600;padding:7px 18px;cursor:pointer;transition:all .15s}
.mode-tab.active{background:var(--ink);color:var(--ink-inv)}
.mode-tab:hover:not(.active){background:var(--surface2)}
/* br-convert button */

<script>
// ── Constants ──
const MODELS={
  sua:  {name:'수아', height:'165',top:'44-55',bottom:'26'},
  soi:  {name:'소이', height:'163',top:'55',   bottom:'25-26'},
  mimi: {name:'미미', height:'161',top:'44',   bottom:'25'},
  seona:{name:'선아', height:'164',top:'44-55',bottom:'26'},
  jiwoo:{name:'지우', height:'167',top:'44-55',bottom:'26'},
};
const FOOTER_MARKERS=['<!---스냅핏','<!--- 스냅핏','<!-- 스냅핏','<!--스냅핏','<!--\n스냅핏','<!--\r\n스냅핏','<iframe id="sf_chart_iframe_id"'];

// ── State ──
let sections=[],footerRaw='';
let currentMode='new';
let cardDragIdx=null,galDragPay=null,lastImgClick=null;
let selCards=new Set();
let animateSecIds=new Set();
const undoStack=[],MAX_UNDO=30;
const historyLog=[],MAX_HIST=20; // 작업 히스토리 (최대 20개)

// ── Undo ──
function snapSec(s){return{...s,images:s.images?s.images.map(x=>({...x})):undefined,selected:s.selected?new Set(s.selected):undefined,models:s.models?s.models.map(m=>({...m})):undefined,fromParsed:s.fromParsed,preContent:s.preContent,postContent:s.postContent};}
function pushUndo(label){
  const snap=sections.map(snapSec);
  undoStack.push({label,snap});
  if(undoStack.length>MAX_UNDO)undoStack.shift();
  // 히스토리 기록 (스냅샷 포함 → 롤백 가능)
  const now=new Date();
  const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  historyLog.unshift({label,time:t,snap});
  if(historyLog.length>MAX_HIST)historyLog.pop();
  refreshUndoHint();
}
function doUndo(){if(!undoStack.length){toast('되돌릴 작업이 없어요');return;}const{snap,label}=undoStack.pop();sections=snap;lastImgClick=null;selCards.clear();renderSections();refreshUndoHint();toast(`↩ 되돌림: ${label}`);}
function refreshUndoHint(){const el=document.getElementById('undo-btn');if(undoStack.length){el.classList.add('active');el.textContent=`↩ ${undoStack[undoStack.length-1].label} 되돌리기`;}else el.classList.remove('active');}

document.addEventListener('keydown',e=>{
  const typing=['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey&&!typing){e.preventDefault();doUndo();return;}
  if(e.key==='Escape'){if(document.getElementById('lb').classList.contains('show')){lbClose();return;}clearCardSel();return;}
  if((e.key==='Delete'||e.key==='Backspace')&&!typing){
    if(selCards.size>0){e.preventDefault();deleteSelectedCards();return;}
    sections.forEach((sec,si)=>{
      if(!sec.selected?.size)return;
      const wrap=document.querySelectorAll('.sec-card')[si];
      if(!wrap?.querySelector('.sec-body.open'))return;
      pushUndo(`이미지 ${sec.selected.size}장 삭제`);
      const ids=[...sec.selected];sec.images=sec.images.filter((_,k)=>!ids.includes(k));sec.selected.clear();lastImgClick=null;
      refreshGallery(wrap,si);toast(`${ids.length}장 삭제됨`);
    });
  }
});

// ── Utils ──
const uid=()=>Math.random().toString(36).slice(2,8);
const escH=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escQ=s=>(s||'').replace(/"/g,'&quot;');
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);}
function getBase(){return document.getElementById('base-url').value.trim().replace(/\/?$/,'/');}
function fmtDate(v){const c=v.trim().replace(/\D/g,'');if(c.length===6)return`20${c.slice(0,2)}/${c.slice(2,4)}/${c.slice(4,6)}`;if(c.length===8)return`${c.slice(0,4)}/${c.slice(4,6)}/${c.slice(6,8)}`;return v;}

// flash: 배경색 확 바뀐 후 목표 opacity로 전환, callback 후 renderSections
function flashCard(cardEl, bgColor, finalOpacity, callback){
  cardEl.style.transition='none';
  cardEl.style.background=bgColor;
  cardEl.style.opacity='1';
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    // 잠시 유지 후 전환
    setTimeout(()=>{
      cardEl.style.transition='background .65s ease, opacity .65s ease';
      cardEl.style.background='';
      cardEl.style.opacity=String(finalOpacity);
      setTimeout(()=>{ cardEl.style.transition=''; cardEl.style.opacity=''; callback(); },680);
    }, 120);
  });});
}

// ── Lightbox ──
let lbUrls=[],lbIdx=0;
function lbOpen(urls,idx){lbUrls=urls;lbIdx=idx;lbShow();document.getElementById('lb').classList.add('show');document.body.style.overflow='hidden';}
function lbShow(){const u=lbUrls[lbIdx];document.getElementById('lb-img').src=u;document.getElementById('lb-info').textContent=`${lbIdx+1} / ${lbUrls.length}  ·  ${u.split('/').pop()}`;}
function lbClose(){document.getElementById('lb').classList.remove('show');document.body.style.overflow='';setTimeout(()=>{document.getElementById('lb-img').src='';},200);}
function lbMove(dir,e){e.stopPropagation();lbIdx=(lbIdx+dir+lbUrls.length)%lbUrls.length;lbShow();}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('show'))return;if(e.key==='ArrowRight'){lbIdx=(lbIdx+1)%lbUrls.length;lbShow();}else if(e.key==='ArrowLeft'){lbIdx=(lbIdx-1+lbUrls.length)%lbUrls.length;lbShow();}});

// ── Image checker ──
function checkImg(url){return new Promise(res=>{const img=new Image();const t=setTimeout(()=>res(false),7000);img.onload=()=>{clearTimeout(t);res(true);};img.onerror=()=>{clearTimeout(t);res(false);};img.src=url+'?_='+Date.now();});}

// ── extractBase: strip ONLY the last trailing number (handles underscore variants) ──
function extractBase(src){
  const fname=src.split('/').pop().replace(/\.\w+$/,'');
  // Strip: optional underscores, then digits, then optional underscores — at end only (once)
  const base=fname.replace(/_*\d+_*$/,'');
  if(base===fname)return null;
  if(!base.includes('_'))return null;
  return base;
}

// ── Parsing helpers ──
function findImgSrcs(html){const re=/src="([^"]+\.(?:jpg|jpeg|png|gif|webp)[^"]*)"/gi;const out=[];let m;while((m=re.exec(html))!==null)out.push(m[1]);return out;}
function findClose(html,tag,start){
  const op=`<${tag.toLowerCase()}`,cl=`</${tag.toLowerCase()}>`;
  let d=0,i=start,len=html.length;
  while(i<len){const lo=html.slice(i).toLowerCase();if(lo.startsWith(op)&&/[\s>\/]/.test(lo[op.length]||'>')){d++;i++;}else if(lo.startsWith(cl)){d--;if(d<=0)return i+cl.length;i+=cl.length;}else i++;}
  return len;
}

// ── Scanner ──
function scan(html){
  const toks=[];let i=0,len=html.length;
  while(i<len){
    const ch=html[i];
    if(ch==='\n'||ch==='\r'||ch==='\t'){i++;continue;}
    if(html.startsWith('<!--',i)){
      const end=html.indexOf('-->',i+4);if(end===-1){i++;continue;}
      const raw=html.slice(i,end+3),inner=html.slice(i+4,end);
      const imgs=findImgSrcs(inner);
      if(imgs.length>0)toks.push({type:'block_cmt',imgs,raw,inner});
      else if(inner.includes('<'))toks.push({type:'html_cmt',raw,inner}); // HTML 태그 포함 → 비활성 텍스트
      else toks.push({type:'comment',text:inner.trim(),raw});
      i=end+3;continue;
    }
    if(html.slice(i).match(/^<br[\s\/>/]/i)){
      let raw='',cnt=0,j=i;
      while(j<len){const m=html.slice(j).match(/^(<br\s*\/?>|\s+)/i);if(!m)break;raw+=m[0];if(/^<br/i.test(m[0]))cnt++;j+=m[0].length;}
      if(cnt>0){toks.push({type:'br',cnt,raw});i=j;continue;}
    }
    if(html.slice(i).match(/^<p[\s>]/i)){
      const im=html.slice(i).match(/^<p[^>]*><img[^>]*\bsrc="([^"]+)"[^>]*\/?><\/p>/i);
      if(im){toks.push({type:'img_p',src:im[1],raw:im[0]});i+=im[0].length;continue;}
      const cp=html.indexOf('</p>',i);if(cp!==-1){toks.push({type:'p_raw',raw:html.slice(i,cp+4)});i=cp+4;continue;}
    }
    if(html.slice(i).match(/^<div[\s>]/i)){
      const cp=findClose(html,'div',i);
      // Unclosed div (wrapper spanning rest of body) → unwrap contents
      if(cp>=html.length-1){
        const is=html.indexOf('>',i)+1;
        if(is>i)toks.push(...scan(html.slice(is)));
        i=html.length;continue;
      }
      toks.push({type:'div',raw:html.slice(i,cp)});i=cp;continue;
    }
    if(html.slice(i).match(/^<style[\s>]/i)){const e=html.indexOf('</style>',i);if(e!==-1){toks.push({type:'other',raw:html.slice(i,e+8)});i=e+8;continue;}}
    if(html.slice(i).match(/^<iframe[\s>]/i)){const e=html.indexOf('</iframe>',i);if(e!==-1){toks.push({type:'other',raw:html.slice(i,e+9)});i=e+9;continue;}}
    if(html.slice(i).match(/^<input[\s>]/i)){const e=html.indexOf('>',i);if(e!==-1){toks.push({type:'other',raw:html.slice(i,e+1)});i=e+1;continue;}}
    if(ch==='<'){const e=html.indexOf('>',i);if(e!==-1){toks.push({type:'other',raw:html.slice(i,e+1)});i=e+1;continue;}}
    const nt=html.indexOf('<',i);const te=nt!==-1?nt:len;
    const txt=html.slice(i,te);if(txt.trim())toks.push({type:'text',raw:txt});
    i=te===i?i+1:te;
  }
  return toks;
}

// ── Model parsing: supports 1 or 2 models, handles "컬러_S 쉬폰 size" patterns ──
function parseModelDivs(raw){
  const n=raw.replace(/&nbsp;/g,' ').replace(/\s+/g,' ');
  const re=/(수아|소이|미미|선아|지우)모델\s*\|\s*([^\s|_]+)\s*컬러_([^\s]+)\s+(?:\S+\s+)*size(?:\s+([^착<\n|]+))?\s*착용/g;
  const models=[];let m;
  while((m=re.exec(n))!==null){
    const key=Object.keys(MODELS).find(k=>MODELS[k].name===m[1]);
    if(key)models.push({modelKey:key,color:m[2].trim(),size:m[3].trim(),desc:(m[4]||'').trim()});
  }
  return models;
}

// ── Classifier ──
function classify(toks){
  const secs=[];let curImg=null,curTxt=null;
  function flushImg(){if(curImg){secs.push(curImg);curImg=null;}}
  function flushTxt(){if(curTxt){secs.push(curTxt);curTxt=null;}}
  function addTxt(raw,cen=false){flushImg();if(curTxt)curTxt.content+=raw;else curTxt={id:uid(),type:'text',content:raw,centered:cen,commented:false};}
  for(const tok of toks){
    if(tok.type==='block_cmt'){
      flushImg();flushTxt();
      const nm=extractBase(tok.imgs[0])||tok.imgs[0].split('/').pop().replace(/\.\w+$/,'');
      // innerRaw: 주석 내부 원본 HTML 보존 (alt 등 속성 유지용)
      secs.push({id:uid(),type:'img-group',name:nm,images:tok.imgs.map(s=>({src:s})),selected:new Set(),commented:true,innerRaw:tok.inner});
      continue;
    }
    if(tok.type==='html_cmt'){
      // HTML 태그 포함 주석 → 비활성 텍스트 섹션
      flushImg();flushTxt();
      const inner=tok.inner;
      // 미리 이름 추출 (모델 정보면 모델명, 아니면 앞부분 텍스트)
      const previewText=inner.replace(/&nbsp;/g,' ').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,50)||'(비활성 HTML)';
      secs.push({id:uid(),type:'cmt-text',innerRaw:inner,raw:tok.raw,preview:previewText,commented:true});
      continue;
    }
    if(tok.type==='comment'){
      flushImg();flushTxt();
      const lbl=tok.text.replace(/^[-★\s]+|[-★\s]+$/g,'').trim().slice(0,40);
      // ★모델이름사이즈설명★ 주석은 model-info가 직접 출력 처리하므로 섹션으로 만들지 않음
      if(lbl==='모델이름사이즈설명')continue;
      secs.push({id:uid(),type:'divider',content:tok.raw,label:lbl,commented:false});
      continue;
    }
    if(tok.type==='img_p'){
      flushTxt();
      const base=extractBase(tok.src);
      if(base&&curImg&&curImg.name===base){curImg.images.push({src:tok.src,rawTag:tok.raw});}
      else{flushImg();if(base)curImg={id:uid(),type:'img-group',name:base,images:[{src:tok.src,rawTag:tok.raw}],selected:new Set(),commented:false};else{const nm=tok.src.split('/').pop().replace(/\.\w+$/,'');secs.push({id:uid(),type:'img-group',name:nm,images:[{src:tok.src,rawTag:tok.raw}],selected:new Set(),commented:false});}}
      continue;
    }
    if(tok.type==='br'){flushImg();addTxt(tok.raw);continue;}
    if(tok.type==='div'){
      flushImg();
      const raw=tok.raw;
      if(/style="[^"]*display\s*:\s*flex/i.test(raw)){flushTxt();const imgs=findImgSrcs(raw);secs.push({id:uid(),type:'flex',content:raw,images:imgs.map(s=>({src:s})),commented:false});continue;}
      if(/모델/.test(raw)&&/컬러/.test(raw)&&/착용/.test(raw)){
        const models=parseModelDivs(raw);
        if(models.length>0){
          // 직전 text 섹션에 모델 정보가 있으면 합쳐서 2인 모델로 처리 (unclosed 바깥 div 언래핑 케이스)
          let allModels=models;
          if(curTxt&&curTxt.content){
            const prevModels=parseModelDivs(curTxt.content);
            if(prevModels.length>0){allModels=[...prevModels,...models];curTxt=null;}
            else flushTxt();
          }
          secs.push({id:uid(),type:'model-info',models:allModels,commented:false,fromParsed:true,originalRaw:raw});
          continue;
        }
      }
      flushTxt();
      if(/(Detail|COLOR|FABRIC|SIZE)/.test(raw)&&/text-align\s*:\s*center/i.test(raw)&&!findImgSrcs(raw).length){secs.push({id:uid(),type:'detail',content:raw,commented:false});continue;}
      if(findImgSrcs(raw).length>0){
        const is=raw.indexOf('>')+1;const ie=raw.lastIndexOf('</div>');
        const inner=ie>is?raw.slice(is,ie):raw.slice(is);
        const inner2=classify(scan(inner));inner2.forEach(s=>{if(s.type==='text')s.centered=true;secs.push(s);});continue;
      }
      addTxt(raw,/text-align\s*:\s*center/i.test(raw));continue;
    }
    if(tok.type==='p_raw'){flushImg();addTxt(tok.raw);continue;}
    if(tok.type==='text'){flushImg();addTxt(tok.raw);continue;}
    if(tok.type==='other'){flushImg();addTxt(tok.raw);continue;}
  }
  flushImg();flushTxt();
  return secs;
}

// ── Post-process: absorb br-only text sections adjacent to model-info ──
function postProcessModelBr(secs){
  const isBrOnly=c=>!c.replace(/<br\s*\/?>/gi,'').replace(/\s/g,'').length;
  const result=[];
  for(let i=0;i<secs.length;i++){
    const sec=secs[i];
    if(sec.type==='model-info'&&sec.fromParsed){
      // absorb preceding br-only text
      if(result.length>0){
        const prev=result[result.length-1];
        if(prev.type==='text'&&!prev.commented&&isBrOnly(prev.content)){
          sec.preContent=prev.content.trim();
          result.pop();
        }
      }
      // absorb following br-only text
      if(i+1<secs.length){
        const next=secs[i+1];
        if(next.type==='text'&&!next.commented&&isBrOnly(next.content)){
          sec.postContent=next.content.trim();
          i++;
        }
      }
      result.push(sec);
    } else {
      result.push(sec);
    }
  }
  return result;
}

// ── Parse entry ──
function parseInput(){
  const raw=document.getElementById('raw-input').value;
  if(!raw.trim()){toast('HTML을 붙여넣어 주세요');return;}
  let fi=raw.length;
  for(const m of FOOTER_MARKERS){const idx=raw.indexOf(m);if(idx!==-1&&idx<fi)fi=idx;}
  footerRaw=raw.slice(fi);
  sections=postProcessModelBr(classify(scan(raw.slice(0,fi))));
  if(!sections.length){toast('섹션을 찾을 수 없어요');return;}
  undoStack.length=0;refreshUndoHint();lastImgClick=null;selCards.clear();
  // 히스토리에 파싱 기록 (스냅샷 포함)
  const now=new Date();
  const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  historyLog.unshift({label:`HTML 붙여넣기 파싱 (${sections.length}개 섹션)`,time:t,snap:sections.map(snapSec)});
  if(historyLog.length>MAX_HIST)historyLog.pop();
  renderSections();
  document.getElementById('sections-wrap').style.display='';
  document.getElementById('gen-wrap').style.display='';
  document.getElementById('out-wrap').style.display='none';
  document.getElementById('f-result').style.display='none';
  toast(`${sections.length}개 섹션 감지됨`);
}

// ── Render ──
const TMETA={
  'img-group':{badge:'b-img',  lbl:'착장 이미지'},
  'model-info':{badge:'b-model',lbl:'모델 정보'},
  'text':      {badge:'b-text', lbl:'텍스트'},
  'detail':    {badge:'b-det',  lbl:'상세 정보'},
  'divider':   {badge:'b-div',  lbl:'구분선'},
  'flex':      {badge:'b-flex', lbl:'이미지 링크'},
  'cmt-text':  {badge:'b-text', lbl:'비활성 HTML'},
};
function secName(sec){
  if(sec.type==='img-group')return sec.name;
  if(sec.type==='model-info'){if(!sec.models?.length)return'(모델 정보)';return sec.models.map(m=>{const md=MODELS[m.modelKey];return`${md?.name||'?'} ${m.color} ${m.size}${m.desc?' ('+m.desc+')':''}`;}).join(' + ');}
  if(sec.type==='text'){const t=sec.content.replace(/<[^>]+>/g,'').replace(/&[^;]+;/g,' ').trim();return t.slice(0,50)||'(여백/빈 줄)';}
  if(sec.type==='detail')return'상세 정보 (COLOR / FABRIC / SIZE)';
  if(sec.type==='divider')return sec.label||'구분선';
  if(sec.type==='flex')return'이미지 링크 그룹';
  if(sec.type==='cmt-text')return sec.preview||'(비활성 HTML)';
  return sec.type;
}

function renderSections(){
  const list=document.getElementById('sections-list');
  list.innerHTML='';
  list.appendChild(makeAZ(0));
  sections.forEach((sec,i)=>{
    const card=makeCard(sec,i);
    if(animateSecIds.has(sec.id))card.classList.add('appear');
    list.appendChild(card);
    list.appendChild(makeAZ(i+1));
  });
  animateSecIds.clear();
  refreshMultiBar();
}

function makeCard(sec,i){
  const wrap=document.createElement('div');
  const isImg=sec.type==='img-group'||sec.type==='flex';
  const meta=TMETA[sec.type]||{badge:'b-text',lbl:'기타'};
  const isOff=sec.commented;
  const isSel=selCards.has(i);
  wrap.className=`sec-card${isOff?' commented':''}${isSel?' sec-sel':''}`;
  const name=secName(sec);

  let hdHtml='';
  if(sec.type==='divider'){
    // 구분선: 주석 버튼 없음 (이미 주석 형식이라 이중 주석 방지)
    hdHtml=`<div class="sec-hd-c" data-hd>
      <div class="drag-hc" title="드래그"><div class="dd-row"><div class="dd"></div><div class="dd"></div></div><div class="dd-row"><div class="dd"></div><div class="dd"></div></div></div>
      <span class="div-dash">—</span>
      <input class="div-in" type="text" value="${escH(sec.label||'')}" placeholder="구분선 설명" data-div-in>
      <span class="div-dash">—</span>
      <div class="sec-meta-c"><span class="badge ${meta.badge}">${meta.lbl}</span></div>
      <div class="sec-acts-c">
        <button class="act-btn act-xs act-del" data-del="${i}">삭제</button>
      </div>
    </div>`;
  } else if(sec.type==='cmt-text'){
    // 비활성 HTML: 활성화 버튼으로 내부 재파싱
    hdHtml=`<div class="sec-hd-c" data-hd>
      <div class="drag-hc" title="드래그"><div class="dd-row"><div class="dd"></div><div class="dd"></div></div><div class="dd-row"><div class="dd"></div><div class="dd"></div></div></div>
      <div class="sec-info-c">
        <span class="sec-name-c" title="${escH(name)}">${escH(name)}</span>
        <div class="sec-meta-c"><span class="badge ${meta.badge}">${meta.lbl}</span><span class="badge b-off">주석됨</span></div>
      </div>
      <div class="arr-c" data-arr>▶</div>
      <div class="sec-acts-c">
        <button class="act-btn act-xs act-off" data-tog="${i}">활성화</button>
        <button class="act-btn act-xs act-del" data-del="${i}">삭제</button>
      </div>
    </div>`;
  } else if(!isImg){
    let prev='';
    if(sec.type==='model-info'&&sec.models?.length){const md=MODELS[sec.models[0].modelKey];prev=`${md?.height}cm · Top ${md?.top} · Bottom ${md?.bottom}${sec.models.length>1?' · 2인':''}`;} 
    else if(sec.type==='text'){prev=sec.content.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,60);}
    else if(sec.type==='detail'){prev='COLOR / FABRIC / SIZE';}
    hdHtml=`<div class="sec-hd-c" data-hd>
      <div class="drag-hc" title="드래그"><div class="dd-row"><div class="dd"></div><div class="dd"></div></div><div class="dd-row"><div class="dd"></div><div class="dd"></div></div></div>
      <div class="sec-info-c">
        <span class="sec-name-c" title="${escH(name)}">${escH(name)}</span>
        ${prev?`<span class="sec-prev-c">${escH(prev)}</span>`:''}
        <div class="sec-meta-c"><span class="badge ${meta.badge}">${meta.lbl}</span><span class="badge ${isOff?'b-off':'b-on'}">${isOff?'주석됨':'활성화'}</span></div>
      </div>
      <div class="arr-c" data-arr>▶</div>
      <div class="sec-acts-c">
        <button class="act-btn act-xs ${isOff?'act-off':'act-on'}" data-tog="${i}">${isOff?'활성화':'주석'}</button>
        <button class="act-btn act-xs act-del" data-del="${i}">삭제</button>
      </div>
    </div>`;
  } else {
    const thumb=sec.images?.[0]?.src||null;const cnt=sec.images?.length;
    hdHtml=`<div class="sec-hd" data-hd>
      <div class="drag-h" title="드래그"><div class="dd-row"><div class="dd"></div><div class="dd"></div></div><div class="dd-row"><div class="dd"></div><div class="dd"></div></div><div class="dd-row"><div class="dd"></div><div class="dd"></div></div></div>
      <div class="sec-thumb">${thumb?`<img src="${escQ(thumb)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'th-icon\\'>📷</div>'">`:`<div class="th-icon">📷</div>`}</div>
      <div class="sec-info">
        <div class="sec-name" title="${escH(name)}">${escH(name)}</div>
        <div class="sec-meta"><span class="badge ${meta.badge}">${meta.lbl}</span>${cnt!==undefined?`<span class="badge ${meta.badge}">${cnt}장</span>`:''}<span class="badge ${isOff?'b-off':'b-on'}">${isOff?'주석됨':'활성화'}</span></div>
      </div>
      <div class="arr" data-arr>▶</div>
      <div class="sec-acts">
        <button class="act-btn ${isOff?'act-off':'act-on'}" data-tog="${i}">${isOff?'활성화':'주석'}</button>
        <button class="act-btn act-del" data-del="${i}">삭제</button>
      </div>
    </div>`;
  }

  wrap.innerHTML=hdHtml+`<div class="sec-body" data-body="${i}"><div class="rmv-notice" data-rmv></div>${buildBody(sec,i)}</div>`;

  const hd=wrap.querySelector('[data-hd]');
  const bd=wrap.querySelector('.sec-body');
  const arr=wrap.querySelector('[data-arr]');
  const dh=wrap.querySelector('.drag-h,.drag-hc');
  const togB=wrap.querySelector('[data-tog]');
  const delB=wrap.querySelector('[data-del]');
  const divIn=wrap.querySelector('[data-div-in]');

  if(divIn){divIn.addEventListener('click',e=>e.stopPropagation());divIn.addEventListener('change',e=>{sections[i].label=e.target.value.trim();});}

  hd.addEventListener('click',e=>{
    if([dh,togB,delB,divIn].some(el=>el&&el.contains(e.target)))return;
    if(e.shiftKey||e.altKey||e.ctrlKey||e.metaKey){
      e.preventDefault();
      if(e.shiftKey){const last=[...selCards].pop();if(last!==undefined){const lo=Math.min(last,i),hi=Math.max(last,i);for(let k=lo;k<=hi;k++)selCards.add(k);}else selCards.add(i);}
      else{selCards.has(i)?selCards.delete(i):selCards.add(i);}
      renderSections();return;
    }
    if(sec.type==='divider')return;
    const open=bd.classList.toggle('open');if(arr)arr.classList.toggle('open',open);
  });
  if(togB)togB.addEventListener('click',()=>toggleSec(i));
  if(delB)delB.addEventListener('click',()=>deleteSec(i));
  if(isImg)bindGalEvents(wrap,i);
  if(sec.type==='text'||sec.type==='detail'||sec.type==='flex'){const ta=wrap.querySelector('textarea[data-cnt]');if(ta)ta.addEventListener('change',e=>{sections[i].content=e.target.value;});}
  if(sec.type==='model-info')bindModelEvents(wrap,i);
  // br 변환 버튼
  const brBtn=wrap.querySelector(`[data-br-conv="${i}"]`);
  if(brBtn){
    brBtn.addEventListener('click',e=>{
      e.stopPropagation();
      const ta=wrap.querySelector('textarea[data-cnt]');
      if(!ta)return;
      const lines=ta.value.split('\n');
      const converted=lines.map(line=>{
        const trimmed=line.trimEnd();
        if(trimmed==='')return '<br>';           // 빈 줄 → <br> 단독
        if(/</.test(trimmed))return trimmed;     // 이미 태그 있는 줄 → 건너뜀
        return '<br>'+trimmed;                   // 일반 텍스트 → <br> 앞에 붙임
      }).join('\n');
      ta.value=converted;
      sections[i].content=converted;
      toast('줄바꿈 변환 완료');
    });
  }

  // 코드 보기 토글 + 적용
  const cvBtn=wrap.querySelector(`[data-cv="${i}"]`);
  const cva=wrap.querySelector(`[data-cva="${i}"]`);
  const capBtn=wrap.querySelector(`[data-cap="${i}"]`);
  if(cvBtn&&cva){
    cvBtn.addEventListener('click',e=>{
      e.stopPropagation();
      const open=cva.classList.toggle('open');
      cvBtn.classList.toggle('active',open);
      if(open){
        const ta=cva.querySelector('.code-ta');
        if(ta){ta.value=buildSecHtml(sections[i]);ta.focus();}
      }
    });
  }
  if(capBtn&&cva){
    capBtn.addEventListener('click',e=>{
      e.stopPropagation();
      const ta=cva.querySelector('.code-ta');
      if(!ta)return;
      const newCode=ta.value;
      pushUndo('코드 직접 수정');
      const sec2=sections[i];
      if(sec2.type==='img-group'){
        const tagRe=/<p[^>]*><img[^>]*\bsrc="([^"]+)"[^>]*\/?><\/p>/gi;
        const newImgs=[];let tm;
        while((tm=tagRe.exec(newCode))!==null)newImgs.push({src:tm[1],rawTag:tm[0]});
        if(newImgs.length>0){sec2.images=newImgs;sec2.selected=new Set();}
      } else if(sec2.type==='model-info'){
        const parsed=classify(scan(newCode));
        const mi=parsed.find(s=>s.type==='model-info');
        if(mi)sec2.models=mi.models;
      } else {
        sec2.content=newCode;
      }
      renderSections();
      // 수정된 섹션 위치로 즉시 스크롤 후 초록 번쩍
      setTimeout(()=>{
        const cards=document.querySelectorAll('.sec-card');
        if(cards[i]){
          cards[i].scrollIntoView({block:'center',behavior:'instant'});
          flashCard(cards[i],'#86efac',1,()=>{});
        }
      },30);
      toast('코드 수정 반영됨');
    });
  }

  // drag - mousedown on handle로 드래그 허용 여부 추적
  let _dhDown=false;
  dh.addEventListener('mousedown',()=>{_dhDown=true;});
  document.addEventListener('mouseup',()=>{_dhDown=false;},{once:false,passive:true});
  wrap.draggable=true;
  wrap.addEventListener('dragstart',e=>{
    if(!_dhDown){e.preventDefault();return;}
    _dhDown=false;
    if(selCards.size===0||!selCards.has(i))selCards.clear();
    cardDragIdx=i;
    e.dataTransfer.effectAllowed='move';
    setTimeout(()=>{
      wrap.classList.add('dragging');
      if(selCards.size>1&&selCards.has(i)){
        document.querySelectorAll('.sec-card').forEach((c,ci)=>{
          if(selCards.has(ci)&&ci!==i)c.classList.add('dragging');
        });
      }
    },0);
  });
  wrap.addEventListener('dragend',()=>{
    document.querySelectorAll('.sec-card').forEach(c=>c.classList.remove('dragging'));
    document.querySelectorAll('.add-zone').forEach(z=>z.classList.remove('drop-target'));
  });
  wrap.addEventListener('dragover',e=>{if(galDragPay)return;e.preventDefault();});
  wrap.addEventListener('dragleave',()=>{});
  wrap.addEventListener('drop',e=>{
    if(galDragPay)return;
    e.preventDefault();
  });
  return wrap;
}

function buildCodeViewBar(i){
  return`<div class="code-view-bar">
    <button class="code-toggle" data-cv="${i}">{ } 코드 보기</button>
  </div>
  <div class="code-area" data-cva="${i}">
    <textarea class="code-ta" rows="7" style="font-family:var(--mono);font-size:11px;" spellcheck="false"></textarea>
    <div style="display:flex;gap:8px;align-items:center;margin-top:5px">
      <button class="code-apply" data-cap="${i}">적용</button>
      <span style="font-size:10px;color:var(--td)">코드를 수정하고 적용을 눌러 반영하세요</span>
    </div>
  </div>`;
}

function buildBody(sec,i){
  if(sec.type==='img-group')return`
    <div class="gal-hint">클릭 선택 · Shift/Ctrl 다중 · 드래그 순서 변경 · 더블클릭 확대</div>
    <div class="gal-bar" style="display:none"><span class="gal-cnt">0개 선택됨</span><button class="btn btn-sm btn-d" data-gdel="${i}">선택 삭제</button><button class="btn btn-sm" data-gclr="${i}">선택 해제</button></div>
    <div class="gal-grid" data-gs="${i}">${buildGalHTML(sec,i)}</div>
    ${buildCodeViewBar(i)}`;
  if(sec.type==='flex')return`
    <div class="gal-hint">이미지 링크 그룹 — HTML 직접 편집</div>
    <textarea data-cnt rows="5">${escH(sec.content)}</textarea>
    <div class="gal-grid" style="margin-top:8px">${(sec.images||[]).map((img,n)=>`<div class="gal-it" style="cursor:default"><img src="${escQ(img.src)}" loading="lazy" onerror="this.style.display='none'"><div class="gal-num">${n+1}</div></div>`).join('')}</div>
    ${buildCodeViewBar(i)}`;
  if(sec.type==='model-info')return buildModelBody(sec,i)+buildCodeViewBar(i);
  if(sec.type==='text')return`<div class="edit-area"><textarea data-cnt rows="5">${escH(sec.content)}</textarea><button class="br-btn" data-br-conv="${i}">줄바꿈 → &lt;br&gt; 변환</button></div>${buildCodeViewBar(i)}`;
  if(sec.type==='detail')return`<div class="edit-area"><textarea data-cnt rows="8">${escH(sec.content)}</textarea></div>${buildCodeViewBar(i)}`;
  if(sec.type==='cmt-text')return`<div class="edit-area" style="font-size:11px;color:var(--tm)">
    <div style="margin-bottom:6px;font-size:10px;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.07em">원본 주석 내용</div>
    <textarea data-cnt rows="6" style="font-size:10.5px">${escH(sec.innerRaw||'')}</textarea>
    <div style="margin-top:6px;font-size:11px;color:var(--td)">※ "활성화" 클릭 시 내부 콘텐츠를 자동 파싱해 적절한 섹션으로 전환합니다</div>
  </div>`;
  return'';
}

function buildModelBody(sec,i){
  const models=sec.models||[{modelKey:'sua',color:'',size:'S',desc:''}];
  let html='<div class="edit-area">';
  models.forEach((m,mi)=>{
    const md=MODELS[m.modelKey]||MODELS.sua;
    html+=`<div class="model-blk">${models.length>1?`<div class="model-blk-lbl">모델 ${mi+1}</div>`:''}
      <div class="model-grid">
        <div class="mf"><label>모델</label><select data-mm data-mi="${mi}">${Object.entries(MODELS).map(([k,v])=>`<option value="${k}"${k===m.modelKey?' selected':''}>${v.name}</option>`).join('')}</select></div>
        <div class="mf"><label>컬러</label><input type="text" data-mc data-mi="${mi}" value="${escH(m.color)}" placeholder="아이보리"></div>
        <div class="mf"><label>사이즈</label><input type="text" data-ms data-mi="${mi}" value="${escH(m.size)}" placeholder="S"></div>
        <div class="mf"><label>설명 <span style="font-size:10px;color:var(--td)">("착용" 앞)</span></label><input type="text" data-md data-mi="${mi}" value="${escH(m.desc)}" placeholder="반팔"></div>
      </div>
      <div class="model-auto" data-minfo data-mi="${mi}">${md.height}cm &nbsp;·&nbsp; Top ${md.top} &nbsp;·&nbsp; Bottom ${md.bottom}</div>
    </div>`;
  });
  return html+'</div>';
}

// ── Model events ──
function bindModelEvents(wrap,i){
  wrap.querySelectorAll('[data-mm]').forEach(sel=>{
    sel.addEventListener('change',e=>{
      const mi=+e.target.dataset.mi,k=e.target.value;sections[i].models[mi].modelKey=k;
      const inf=wrap.querySelector(`[data-minfo][data-mi="${mi}"]`);const md=MODELS[k];
      if(inf&&md)inf.textContent=`${md.height}cm · Top ${md.top} · Bottom ${md.bottom}`;
    });
  });
  wrap.querySelectorAll('[data-mc]').forEach(el=>el.addEventListener('change',e=>{sections[i].models[+e.target.dataset.mi].color=e.target.value.trim();}));
  wrap.querySelectorAll('[data-ms]').forEach(el=>el.addEventListener('change',e=>{sections[i].models[+e.target.dataset.mi].size=e.target.value.trim()||'S';}));
  wrap.querySelectorAll('[data-md]').forEach(el=>el.addEventListener('change',e=>{sections[i].models[+e.target.dataset.mi].desc=e.target.value.trim();}));
}

// ── Gallery ──
function buildGalHTML(sec,i){
  return(sec.images||[]).map((img,n)=>`
    <div class="gal-it${sec.selected?.has(n)?' gsel':''}" draggable="true" data-si="${i}" data-ii="${n}">
      <img src="${escQ(img.src)}" loading="lazy" onerror="this.style.display='none'">
      <div class="gal-num">${n+1}</div><div class="gal-chk">✓</div>
    </div>`).join('');
}

function bindGalEvents(wrap,si){
  wrap.querySelectorAll('.gal-it').forEach(el=>{
    const ii=+el.dataset.ii;
    el.addEventListener('click',e=>{
      e.stopPropagation();const sec=sections[si];if(!sec.selected)sec.selected=new Set();
      if(e.shiftKey&&lastImgClick?.si===si){const lo=Math.min(lastImgClick.ii,ii),hi=Math.max(lastImgClick.ii,ii);if(!e.ctrlKey&&!e.metaKey)sec.selected.clear();for(let k=lo;k<=hi;k++)sec.selected.add(k);}
      else if(e.ctrlKey||e.metaKey||e.altKey){sec.selected.has(ii)?sec.selected.delete(ii):sec.selected.add(ii);}
      else{sec.selected.clear();sec.selected.add(ii);}
      lastImgClick={si,ii};refreshGalSel(wrap,si);
    });
    el.addEventListener('dblclick',e=>{e.stopPropagation();const urls=sections[si].images.map(x=>x.src);if(urls.length)lbOpen(urls,ii);});
    el.addEventListener('dragstart',e=>{
      e.stopPropagation();const sec=sections[si];if(!sec.selected)sec.selected=new Set();
      let idxs;if(sec.selected.has(ii)){idxs=[...sec.selected].sort((a,b)=>a-b);}else{sec.selected.clear();sec.selected.add(ii);idxs=[ii];refreshGalSel(wrap,si);}
      galDragPay={si,idxs};e.dataTransfer.effectAllowed='move';
      setTimeout(()=>idxs.forEach(k=>wrap.querySelector(`.gal-it[data-ii="${k}"]`)?.classList.add('gdrag')),0);
    });
    el.addEventListener('dragend',e=>{e.stopPropagation();wrap.querySelectorAll('.gal-it').forEach(x=>x.classList.remove('gdrag','gdrop'));galDragPay=null;});
    el.addEventListener('dragover',e=>{if(!galDragPay||galDragPay.si!==si)return;e.preventDefault();e.stopPropagation();wrap.querySelectorAll('.gal-it').forEach(x=>x.classList.remove('gdrop'));if(!galDragPay.idxs.includes(ii))el.classList.add('gdrop');});
    el.addEventListener('dragleave',e=>{e.stopPropagation();el.classList.remove('gdrop');});
    el.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();el.classList.remove('gdrop');
      if(!galDragPay||galDragPay.si!==si||galDragPay.idxs.includes(ii))return;
      pushUndo('이미지 순서 변경');const imgs=sections[si].images;const ref=imgs[ii];
      const moved=galDragPay.idxs.map(k=>imgs[k]);const rest=imgs.filter((_,k)=>!galDragPay.idxs.includes(k));

function toggleSec(i){

    pushUndo('비활성 섹션 활성화');
    const inner=sec.innerRaw||'';
    const parsed=classify(scan(inner));
    if(parsed.length>=1){
      const newSecs=parsed.map((s,j)=>({...s,id:j===0?sec.id:uid(),commented:false}));
      newSecs.forEach(s=>animateSecIds.add(s.id));
      sections.splice(i,1,...newSecs);

      sections[i]={id:sec.id,type:'text',content:inner,centered:false,commented:false};
      animateSecIds.add(sec.id);
    }
    renderSections();toast(`활성화됨 (${parsed.length||1}개 섹션)`);return;
  }
  const willComment=!sections[i].commented;
  const label=`${willComment?'주석 처리':'활성화'}: ${secName(sections[i])}`;
  pushUndo(label);
  sections[i].commented=willComment;

    const bg=isNowCommented?'#fecaca':'#bbf7d0';
    flashCard(targetCard,bg,isNowCommented?.42:1,()=>renderSections());
  } else {
    renderSections();
  }
  toast(isNowCommented?'주석 처리됨':'활성화됨');
}

// ── HTML output ──
const MODEL_CMT='<!----------★모델이름사이즈설명★-------------->'; 
function buildModelHtml(sec){
  const models=sec.models||[];if(!models.length)return'';
  if(models.length===1){
    const m=models[0];const md=MODELS[m.modelKey];const ds=m.desc?` ${m.desc}`:'';
    const div=`<div style="text-align: center;"><strong>${md.name}모델 &nbsp;| &nbsp;${m.color} 컬러_${m.size} size${ds} 착용</strong>\n\t<br>\n\n\t<p style="text-align: center;">${md.height}cm &nbsp; &nbsp;Top ${md.top} &nbsp; &nbsp;Bottom ${md.bottom}</p>\n</div>`;
    if(sec.fromParsed){
      const br5f='<br>\n<br>\n<br>\n<br>\n<br>';
      const br2f='<br>\n<br>';
      const pre=sec.preContent?sec.preContent+'\n':br5f+'\n';
      const post=sec.postContent?'\n'+sec.postContent:'\n'+br2f;
      return`${MODEL_CMT}\n${pre}${div}\n${MODEL_CMT}${post}`;
    }
    const br5='<br>\n<br>\n<br>\n<br>\n<br>';
    const br2='<br>\n<br>';
    return`${MODEL_CMT}\n${br5}\n${div}\n${br2}\n${MODEL_CMT}`;
  }
  // 2인 모델
  const m0=models[0];const md0=MODELS[m0.modelKey];const ds0=m0.desc?` ${m0.desc}`:'';
  const m1=models[1];const md1=MODELS[m1.modelKey];const ds1=m1.desc?` ${m1.desc}`:'';
  const div2=`<div style="text-align: center;"><strong>${md0.name}모델 &nbsp;| &nbsp;${m0.color} 컬러_${m0.size} size${ds0} 착용</strong>\n<br>\n<div style="text-align: center;"><strong>${md1.name}모델 &nbsp;| &nbsp;${m1.color} 컬러_${m1.size} size${ds1} 착용</strong>\n</div>\n</div>`;
  const br5d='<br>\n<br>\n<br>\n<br>\n<br>';
  const br2d='<br>\n<br>';
  if(sec.fromParsed){
    const pre=sec.preContent?sec.preContent+'\n':br5d+'\n';
    const post=sec.postContent?'\n'+sec.postContent:'\n'+br2d;
    return`${MODEL_CMT}\n${pre}${div2}\n${MODEL_CMT}${post}`;
  }
  return`${MODEL_CMT}\n${br5d}\n${div2}\n${br2d}\n${MODEL_CMT}`;
}

function buildSecHtml(sec){
  if(sec.type==='img-group'){
    // 주석 상태이고 innerRaw가 있으면 원본 그대로 출력 (alt 등 속성 완전 보존)
    if(sec.commented&&sec.innerRaw)return`<!--${sec.innerRaw}-->`;
    const imgs=sec.images.map(img=>img.rawTag||`<p style="text-align: center;"><img src="${img.src}"></p>`).join('\n');
    return sec.commented?`<!--\n${imgs}\n-->`:imgs;
  }
  if(sec.type==='model-info')return buildModelHtml(sec);
  if(sec.type==='text'){
    if(sec.commented)return`<!--\n${sec.content}\n-->`;
    if(sec.centered&&sec.content.trim()&&!sec.content.trim().startsWith('<div'))return`<div style="text-align: center;">\n${sec.content}\n</div>`;
    return sec.content;
  }
  if(sec.type==='divider'){
    const lbl=sec.label?`-------------------${sec.label}-------------------`:'-------------------구분선--------------------';
    return`<!--${lbl}-->`;
  }
  if(sec.type==='cmt-text'){
    // 원본 주석 그대로 출력
    return sec.raw||`<!--\n${sec.innerRaw||''}\n-->`;
  }
  if(sec.type==='detail'||sec.type==='flex')return sec.commented?`<!--\n${sec.content}\n-->`:sec.content;
  return sec.content||'';
}

  const fr=document.getElementById('f-result');

  document.getElementById('out-wrap').style.display='none';
  document.getElementById('gen-btn').textContent='HTML 생성';

  const parts=sections.map(sec=>buildSecHtml(sec).trim()).filter(p=>p!=='');
  let html=parts.join('\n\n');
  if(footerRaw)html+='\n\n'+footerRaw;
  document.getElementById('out-html').value=html;
  const on=sections.filter(s=>!s.commented&&s.type!=='cmt-text').length;
  const off=sections.filter(s=>s.commented||s.type==='cmt-text').length;
  const imgT=sections.reduce((s,sec)=>s+(sec.commented?0:(sec.images?.length||0)),0);
  document.getElementById('out-meta').textContent=`활성 ${on}섹션 · 주석 ${off}섹션 · 이미지 ${imgT}장`;
  document.getElementById('out-wrap').style.display='';
  document.getElementById('copy-btn').textContent='클립보드에 복사';
  document.getElementById('copy-btn').classList.remove('copied');
  document.getElementById('out-wrap').scrollIntoView({behavior:'smooth',block:'start'});
  toast('HTML 생성 완료');
}

function copyOutput(){
  const text=document.getElementById('out-html').value;const btn=document.getElementById('copy-btn');
  const done=()=>{btn.textContent='복사 완료 ✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent='클립보드에 복사';btn.classList.remove('copied');},2500);};
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(done).catch(fallback);else fallback();
  function fallback(){const ta=document.getElementById('out-html');ta.select();ta.setSelectionRange(0,99999);try{document.execCommand('copy');done();}catch{toast('복사 실패');}}
}

function switchMode(mode){
  currentMode=mode;
  document.getElementById('tab-paste').classList.toggle('active',mode==='paste');
  document.getElementById('tab-new').classList.toggle('active',mode==='new');
  document.getElementById('mode-paste').style.display=mode==='paste'?'':'none';
  document.getElementById('mode-new').style.display=mode==='new'?'':'none';
  // 섹션 편집/생성 영역 숨기기
  document.getElementById('sections-wrap').style.display='none';
  document.getElementById('gen-wrap').style.display='none';
  document.getElementById('out-wrap').style.display='none';
  sections=[];footerRaw='';undoStack.length=0;selCards.clear();lastImgClick=null;refreshUndoHint();
}

function startNew(){
  sections=[];footerRaw='';undoStack.length=0;selCards.clear();lastImgClick=null;refreshUndoHint();
  renderSections();
  document.getElementById('sections-wrap').style.display='';
  document.getElementById('gen-wrap').style.display='';
  document.getElementById('out-wrap').style.display='none';
  document.getElementById('f-result').style.display='none';
  toast('새 페이지 편집을 시작합니다');
}

// ── History panel ──
function openHist(){
  renderHistList();
  document.getElementById('hist-panel').classList.add('open');
  document.getElementById('hist-overlay').classList.add('show');
}
function closeHist(){
  document.getElementById('hist-panel').classList.remove('open');
  document.getElementById('hist-overlay').classList.remove('show');
}
function renderHistList(){
  const list=document.getElementById('hist-list');
  if(!historyLog.length){list.innerHTML='<div class="hist-empty">아직 작업 내역이 없어요</div>';return;}
  list.innerHTML=historyLog.map((h,idx)=>`
    <div class="hist-item${idx===0?' hist-latest':''}" data-hidx="${idx}" title="클릭하면 이 시점으로 롤백">
      <span class="hist-idx">${historyLog.length-idx}</span>
      <span class="hist-lbl">${escH(h.label)}</span>
      <span class="hist-time">${h.time}</span>
    </div>`).join('');
  list.querySelectorAll('.hist-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=+el.dataset.hidx;
      const h=historyLog[idx];
      if(!h.snap){toast('이 항목은 롤백 데이터가 없어요');return;}
      if(!confirm(`"${h.label}" 시점으로 롤백할까요?\n이후 작업은 모두 사라집니다.`))return;
      sections=h.snap;
      lastImgClick=null;selCards.clear();
      undoStack.length=0;refreshUndoHint();
      renderSections();
      closeHist();
      toast(`↩ 롤백: ${h.label}`);
    });
  });
}

function resetAll(){
  document.getElementById('raw-input').value='';
  sections=[];footerRaw='';undoStack.length=0;selCards.clear();lastImgClick=null;refreshUndoHint();
  ['sections-wrap','gen-wrap','out-wrap','f-result'].forEach(id=>{document.getElementById(id).style.display='none';});
}
</script>
